name: ex1-manual-trigger

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Name to greet'
        required: true
        default: 'World'
      message:
        description: 'Custom message'
        required: false
        default: ""

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Output Inputs
        run: |
            echo "Input parameters:"
            echo "${{ toJSON(github.event.inputs) }}"
      - name: Echo name
        run: echo "Hello, ${{ github.event.inputs.name }}"
